<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Page Not Found</title>
<style>
	body {
		margin: 0;
		height: 100vh;
		display: flex;
		align-items: center;
		justify-content: center;
		background: linear-gradient(navy);
		font-family: 'Georgia', serif;
		color: Yellow;
		text-align: center;
	}
	.container {
		max-width: 500px;
	}
	h1 {
		font-size: 8rem;
		margin: 0;
		background: linear-gradient(90deg, #ff6b6b, #f7b731);
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
	}
	p {
		font-size: 1.5rem;
		margin-top: 0;
	}
	

</style>
</head>
<body>
	<div class="container">

		<h1>404</h1>
		<p>Ceci n'est pas une page</p>
		<p style="font-size:1rem; opacity:0.7;">The page you're looking for doesn't exist.</p>
	</div>
</body>
</html>
